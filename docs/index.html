<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#7fb3d5" />
<title>뽀숑이 🐶</title>
<style>
  :root {
    --bg: #f4f7fb;
    --card: #ffffff;
    --ink: #2c3a47;
    --muted: #7a8a99;
    --sky: #7fb3d5;
    --sky-soft: #e8f1f9;
    --peach: #ffb6a3;
    --peach-soft: #fff0eb;
    --line: #eef2f6;
    --shadow: 0 6px 24px rgba(60, 90, 120, .08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                 "Malgun Gothic", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 48px; }

  /* Hero */
  .hero {
    background: linear-gradient(160deg, #aed5ee 0%, #cfe6f6 60%, #ffe5dc 100%);
    border-radius: 26px;
    padding: 30px 24px 26px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .avatar {
    width: 108px; height: 108px;
    margin: 0 auto 12px;
    border-radius: 50%;
    background: #fff;
    display: grid; place-items: center;
    font-size: 60px;
    box-shadow: 0 4px 16px rgba(60,90,120,.16);
    border: 4px solid #fff;
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .hero h1 { margin: 4px 0 2px; font-size: 30px; letter-spacing: -.5px; }
  .hero .sub { color: #4a6275; font-weight: 600; font-size: 15px; }
  .hero .age { margin-top: 6px; font-size: 14px; color: #5a7588; }

  /* Countdown */
  .countdown {
    margin: 16px auto 0;
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(4px);
    border-radius: 999px;
    padding: 8px 16px;
    font-weight: 700; font-size: 14px; color: #c0573f;
  }
  .countdown b { font-size: 16px; }

  /* Cards */
  .grid { margin-top: 18px; display: grid; gap: 14px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 18px 18px;
    box-shadow: var(--shadow);
  }
  .card .label {
    font-size: 12px; font-weight: 700; letter-spacing: .04em;
    color: var(--muted); text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .card .value { margin-top: 6px; font-size: 19px; font-weight: 700; }
  .card .value small { font-size: 13px; color: var(--muted); font-weight: 600; }
  .card p { margin: 6px 0 0; font-size: 14px; color: #4a5b6a; }

  .meals { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .meal { display: grid; grid-template-columns: 56px 1fr auto; align-items: center;
          gap: 10px; background: var(--sky-soft); border-radius: 12px; padding: 9px 12px; }
  .meal-name { font-weight: 800; font-size: 14px; color: #3d6680; }
  .meal-time { font-size: 14px; color: #4a5b6a; font-variant-numeric: tabular-nums; }
  .meal-amt { font-weight: 800; font-size: 16px; color: var(--ink); }
  .breakdown { margin-top: 10px !important; font-size: 13px; color: #6a7a89;
               background: #f7fafc; border-radius: 10px; padding: 8px 11px; }

  .pill { display:inline-block; background: var(--sky-soft); color:#3d6680;
          border-radius: 999px; padding: 3px 10px; font-size: 12px; font-weight:700;
          margin: 2px 4px 2px 0; }

  a.link-card { display: block; text-decoration: none; color: inherit; transition: transform .12s ease; }
  a.link-card:active { transform: scale(.99); }
  a.link-card .more {
    display: inline-block; margin-top: 10px; font-size: 13px; font-weight: 800;
    color: var(--sky); background: var(--sky-soft); border-radius: 999px; padding: 5px 12px;
  }

  .caution {
    background: var(--peach-soft);
    border: 1px solid #ffd9cf;
  }
  .caution .label { color: #c0573f; }
  .caution p { color: #8a4a3a; font-weight: 600; }

  .footer { text-align:center; margin-top: 22px; color: var(--muted); font-size: 12px; }
  .footer a { color: var(--sky); text-decoration: none; font-weight: 700; }
  .err { text-align:center; color: var(--muted); padding: 30px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="avatar" id="avatar">🐶</div>
    <h1 id="name">뽀숑</h1>
    <div class="sub" id="sub">비숑 프리제 · 남아</div>
    <div class="age" id="age"></div>
    <div class="countdown" id="countdown" style="display:none"></div>
  </div>

  <div class="grid" id="cards"></div>

  <div class="footer" id="footer"></div>
</div>

<script>
  const fmtDate = (s) => {
    const [y,m,d] = s.split("-").map(Number);
    return `${y}.${m}.${d}`;
  };
  const daysBetween = (from, to) =>
    Math.round((to - from) / 86400000);

  function ageText(birthStr) {
    const b = new Date(birthStr + "T00:00:00");
    const now = new Date();
    let months = (now.getFullYear()-b.getFullYear())*12 + (now.getMonth()-b.getMonth());
    if (now.getDate() < b.getDate()) months--;
    const tmp = new Date(b); tmp.setMonth(b.getMonth()+months);
    const days = daysBetween(tmp, now);
    return `${months}개월 ${days}일 (${fmtDate(birthStr)}생)`;
  }

  function render(d) {
    document.getElementById("name").textContent = d.name;
    document.getElementById("sub").textContent =
      `${d.breed} · ${d.sex}${d.neutered ? " · 중성화 완료" : ""}`;
    document.getElementById("age").textContent = "🎂 " + ageText(d.birth);

    if (d.avatar) {
      const a = document.getElementById("avatar");
      a.innerHTML = `<img src="${d.avatar}" alt="뽀숑" />`;
    }

    if (d.nextEvent) {
      const ev = d.nextEvent;
      const today = new Date(); today.setHours(0,0,0,0);
      const evd = new Date(ev.date + "T00:00:00");
      const left = daysBetween(today, evd);
      const c = document.getElementById("countdown");
      c.style.display = "inline-flex";
      if (left > 0)       c.innerHTML = `📌 ${ev.label}까지 <b>D-${left}</b> · ${fmtDate(ev.date)}`;
      else if (left === 0)c.innerHTML = `📌 오늘 <b>${ev.label}</b>!`;
      else                c.innerHTML = `📌 ${ev.label} (${fmtDate(ev.date)} 지남)`;
    }

    const cards = [];
    cards.push(`
      <div class="row2">
        <div class="card">
          <div class="label">⚖️ 몸무게</div>
          <div class="value">${d.weight} <small>${fmtDate(d.weightDate)}</small></div>
        </div>
        <div class="card">
          <div class="label">🍽️ 급여</div>
          <div class="value" style="font-size:15px">${d.feeding}</div>
        </div>
      </div>`);

    if (d.feedingSchedule && d.feedingSchedule.length) {
      cards.push(`
        <div class="card">
          <div class="label">⏰ 급식 시간표${d.dailyKcal ? ` · 하루 ${d.dailyKcal}` : ""}</div>
          <div class="meals">
            ${d.feedingSchedule.map(m => `
              <div class="meal">
                <span class="meal-name">${m.meal}</span>
                <span class="meal-time">${m.time}</span>
                <span class="meal-amt">${m.amount}</span>
              </div>`).join("")}
          </div>
          ${d.mealBreakdown ? `<p class="breakdown">🥄 ${d.mealBreakdown}</p>` : ""}
        </div>`);
    }

    cards.push(`
      <div class="card">
        <div class="label">🥣 현재 사료</div>
        <p>${d.food}</p>
      </div>`);

    if (d.cautions && d.cautions.length) {
      cards.push(`
        <div class="card caution">
          <div class="label">⚠️ 주의사항</div>
          ${d.cautions.map(c => `<p>${c}</p>`).join("")}
        </div>`);
    }

    if (d.trainingStage) {
      cards.push(`
        <a class="card link-card" href="./training.html">
          <div class="label">🎓 이번 훈련 단계</div>
          <p>${d.trainingStage}</p>
          <span class="more">훈련 목록 · 수행 방법 보기 →</span>
        </a>`);
    }

    document.getElementById("cards").innerHTML = cards.join("");
    document.getElementById("footer").innerHTML =
      `마지막 업데이트 ${fmtDate(d.updated)} · 뽀숑이 가족 기록장 🐾`;
  }

  fetch("./data.json?v=" + Date.now())
    .then(r => r.json())
    .then(render)
    .catch(() => {
      document.getElementById("cards").innerHTML =
        `<div class="err">데이터를 불러오지 못했어요.<br/>인터넷 연결을 확인하거나 잠시 후 다시 열어주세요.</div>`;
    });
</script>
</body>
</html>
